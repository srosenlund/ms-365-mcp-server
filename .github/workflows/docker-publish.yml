name: docker-publish
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['Dockerfile', 'src/**', 'package*.json', '.github/workflows/docker-publish.yml']
jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/srosenlund/ms-365-mcp-server:latest
